<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PingJudy - Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- หน้า Login -->
  <div id="loginBox" class="card">
    <h2>🔐 เข้าสู่ระบบแอดมิน</h2>
    <input type="password" id="adminPassword" placeholder="กรอกรหัสผ่าน">
    <button onclick="checkLogin()">เข้าสู่ระบบ</button>
    <p id="loginError" style="color:red;"></p>
  </div>

  <!-- หน้า Dashboard -->
  <div id="adminPanel" style="display:none;">

    <div class="logo-circle">PINGJUDY</div>
    <h1>Admin Dashboard</h1>

    <div class="card">
      <h2>เพิ่มคิวใหม่</h2>

      <input type="text" id="customerName" placeholder="ชื่อลูกค้า">
      <input type="text" id="jobName" placeholder="ชื่องาน">

      <select id="status">
        <option value="waiting">รอคิว</option>
        <option value="doing">กำลังทำ</option>
        <option value="review">รอตรวจงาน</option>
        <option value="done">เสร็จแล้ว</option>
      </select>

      <textarea id="progressDetail" placeholder="รายละเอียดเพิ่มเติม เช่น กำลังลงสี"></textarea>

      <button onclick="addOrder()">เพิ่มคิว</button>
    </div>

    <div class="card">
      <h2>รายการคิวทั้งหมด</h2>
      <div id="orderList"></div>
      <button class="danger" onclick="clearAll()">ล้างคิวทั้งหมด</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
