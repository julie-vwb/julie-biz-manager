<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PingJudy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="logo-circle">PINGJUDY</div>
  <h1>สถานะคิวงาน</h1>

  <!-- กำลังทำ -->
  <div class="card highlight">
    <h2>🎨 ตอนนี้กำลังทำ</h2>
    <div id="currentWork">ยังไม่มีงานกำลังทำ</div>
  </div>

  <!-- ค้นหา -->
  <div class="card">
    <h2>🔍 ค้นหาออเดอร์ของคุณ</h2>
    <input type="text" id="searchInput" placeholder="กรอกหมายเลข เช่น ORD1001">
    <button onclick="searchOrder()">ค้นหา</button>
    <div id="searchResult"></div>
  </div>

  <!-- คิวทั้งหมด -->
  <div class="card">
    <h2>📋 คิวทั้งหมด</h2>
    <div id="publicQueue"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
